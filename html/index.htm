<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="UTF-8">
    <title>Status</title>
    <!--    <script src="https://code.jquery.com/jquery-3.3.1.js"></script>-->
    <script src="jquery.js"></script>
    <script >
        // var host_global = "http://127.0.0.1:8003"
        var host_global = window.location.protocol + "//" + window.location.host;

        var start = new Date;
        function populate2(){
            //var host = window.location.protocol + "//" + window.location.host;

            $.ajax({
                url: host_global+"/json/status_full"
            }).then(function(data) {
                var obj = jQuery.parseJSON(data);

                if (obj.hasOwnProperty('fs'))
                {
                    $('.disk').text( obj.fs.FileSystemClient.free_str);
                    $('.filesystem').text(obj.fs.FileSystemClient.error);
                    list = document.getElementById("dirs");
                    list.innerHTML = ""
                    for (let i =0; i <  obj.fs.FileSystemClient.dirs.length; i++ )
                    {
                        list.innerHTML += "<li>"+obj.fs.FileSystemClient.dirs[i] +"</li>";
                    }
                }
                if (obj.hasOwnProperty('gnss'))
                {
                    var satellites = obj.gnss.gga.satellites_tracked;
                    var fixQuality = obj.gnss.gga.fix_quality;
                    var fixLabel;
                    if (fixQuality == 0)       fixLabel = "No Fix";
                    else if (fixQuality == 1)  fixLabel = "GPS";
                    else if (fixQuality == 2)  fixLabel = "DGPS";
                    else if (fixQuality == 4)  fixLabel = "RTK Fixed";
                    else if (fixQuality == 5)  fixLabel = "RTK Float";
                    else                       fixLabel = "Unknown fix: " + fixQuality;

                    var html = "Satellites: "+ satellites ;
                    html += "<br> Fix: " + fixQuality+ " ("+fixLabel+")" ;
                    if (obj.gnss.hasOwnProperty('ntrip_client'))
                    {
                        html += "<br>RTCM3: " + obj.gnss.ntrip_client.number_of_rtcm3_messages;
                        html += "<br>GGA: " + obj.gnss.ntrip_client.number_of_gga_messages;
                    }
                    $('.gnss').html(html);
                }
                else
                {
                    $('.gnss').text( "N/A");
                }


            });
        };

        function populate1(){
            //var host = window.location.protocol + "//" + window.location.host;

            $.ajax({
                url: host_global+"/json/status"
            }).then(function(data) {
                var obj = jQuery.parseJSON(data);

                $('.msgs_lidar').text( obj.lidar.counters.lidar);
                $('.msgs_imu').text( obj.lidar.counters.imu);
                $('.state').text( obj.state);

            });
        };


        setInterval(function() {populate1();}, 100);
        setInterval(function() {populate2();}, 1000);

        function loadNtripConfig() {
            $.ajax({ url: host_global+"/json/ntrip_config" }).then(function(data) {
                var obj = jQuery.parseJSON(data);
                $('#ntrip_host').val(obj.host || '');
                $('#ntrip_port').val(obj.port || '2101');
                $('#ntrip_mount').val(obj.mount_point || '');
                $('#ntrip_user').val(obj.user_name || '');
                $('#ntrip_pass').val(obj.password || '');
            });
        }

        function saveNtripConfig() {
            var payload = {
                host:        $('#ntrip_host').val(),
                port:        $('#ntrip_port').val(),
                mount_point: $('#ntrip_mount').val(),
                user_name:   $('#ntrip_user').val(),
                password:    $('#ntrip_pass').val()
            };
            $.ajax({
                url: host_global+"/json/ntrip_config",
                method: 'POST',
                contentType: 'application/json',
                data: JSON.stringify(payload)
            }).then(function() {
                $('#ntrip_status').text('Saved and restarted.');
            }).fail(function(xhr) {
                $('#ntrip_status').text('Error: ' + xhr.responseText);
            });
        }

        $(document).ready(function() { loadNtripConfig(); });


        function start_bag() {
            $.ajax({
                url: host_global+"/trig/start_bag"
            })
        }

        function stop_bag() {
            $.ajax({
                url: host_global+"/trig/stop_bag"
            })
        }

        function stopscan(){
            $.ajax({
                url: host_global+"/trig/stopscan"
            })
        }

    </script>
    <style>
        table {
            border-collapse: collapse;
            width: 100%;
        }

        th, td {
            text-align: left;
            padding: 8px;
        }

        tr:nth-child(even){background-color: #f2f2f2}

        th {
            background-color: #04AA6D;
            color: white;
        }
        pre.bag_info {
            display: block;
            font-family: monospace;
            white-space: pre;
            font-size: 15px;
            color : #e1e1e1;
            background-color: #1b1d1c;
            margin: 1em 0;
        }
        pre.diagnostic {
            display: block;
            font-family: monospace;
            white-space: pre;
            font-size: 15px;
            color : #e1e1e1;
            background-color: #332233;
            margin: 1em 0;
        }

        .block {
            display: block;
            width: 100%;
            background-color: #04AA6D;
            padding: 14px 28px;
            font-size: 16px;
            margin: 0.2em 0;
            cursor: pointer;
            text-align: center;
        }
        .block_stopscan {
            display: block;
            width: 100%;
            background-color: #7577dc;
            padding: 14px 28px;
            font-size: 16px;
            margin: 0.2em 0;
            cursor: pointer;
            text-align: center;
        }
        .block_stopscan:hover {
            background-color: #ddd;
            color: black;
        }
        .block_stopscan:active {
            background-color: #da2121;
            color: black;
        }

        .block:hover {
            background-color: #ddd;
            color: black;
        }
        .block:active {
            background-color: #da2121;
            color: black;
        }

        .nonblock {
            display: block;
            background-color: #04AA6D;
            padding: 14px 28px;
            font-size: 16px;
            margin: 0.2em 0;
            cursor: pointer;
            text-align: center;
        }
        .nonblock:hover {
            background-color: #ddd;
            color: black;
        }
        .nonblock:active {
            background-color: #da2121;
            color: black;
        }

    </style>
</head>

<body>
<button type="button" id="btn_trigg1" onclick="start_bag()" style="display:inline;" class="block">Start Record</button>
<button type="button" id="btn_trigg2" onclick="stop_bag()" style="display:inline;"class="block" >Stop Record</button>
<button type="button" id="btn_stopscan" onclick="stopscan()" style="display:inline;"class="block_stopscan" >StopScan</button>
<div>

    <table>
        <tr>
            <th>Lidar</th>
            <th>IMU</th>
            <th>Disk</th>
            <th>State</th>
            <th>GNSS</th>
            <th>Filesystem</th>

        </tr>
        <tr>
            <td class="msgs_lidar">-1</td>
            <td class="msgs_imu">-1</td>
            <td class="disk">-1</td>
            <td class="state">-1</td>
            <td class="gnss"></td>
            <td class="filesystem"></td>
        </tr>
    </table>
    <ul id="dirs">
        <li><a href="#"></a></li>
    </ul>

    <details>
        <summary style="cursor:pointer; font-size:1.2em; font-weight:bold; padding:8px 0;">NTRIP Configuration</summary>
        <table>
            <tr><th>Field</th><th>Value</th></tr>
            <tr><td>Host</td><td><input id="ntrip_host" type="text" size="30"></td></tr>
            <tr><td>Port</td><td><input id="ntrip_port" type="text" size="6"></td></tr>
            <tr><td>Mountpoint</td><td><input id="ntrip_mount" type="text" size="20"></td></tr>
            <tr><td>User</td><td><input id="ntrip_user" type="text" size="20"></td></tr>
            <tr><td>Password</td><td><input id="ntrip_pass" type="password" size="20"></td></tr>
        </table>
        <button type="button" onclick="saveNtripConfig()" class="block">Save NTRIP config</button>
        <div id="ntrip_status"></div>
    </details>
</body>
</html>
