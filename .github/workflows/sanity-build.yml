name: Sanity Build (Debian Bookworm x64)

on:
  push:
    branches: [main]
  pull_request:

jobs:
  sanity-build:
    name: Sanity Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    container:
      image: debian:bookworm

    steps:
      - name: Install dependencies
        run: |
          apt-get update -qq
          apt-get install -y -qq --no-install-recommends \
            build-essential cmake git pkg-config ca-certificates \
            libserial-dev libgpiod-dev libzmq3-dev libboost-all-dev \
            libpistache-dev rapidjson-dev nlohmann-json3-dev libzmq3-dev cppzmq-dev \
            libcamera-dev libopencv-dev pps-tools
          update-ca-certificates

      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Build - mandeye-standard-rpi5.h
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DMANDEYE_HARDWARE_HEADER=mandeye-standard-rpi5.h
          cmake --build build -j$(nproc)

      - name: Build - mandeye-direct-cm5.h
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DMANDEYE_HARDWARE_HEADER=mandeye-direct-cm5.h
          cmake --build build -j$(nproc)
