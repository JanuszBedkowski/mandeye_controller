name: clang-format

on:
  pull_request:
  push:
    branches: [main]

jobs:
  format-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: sudo apt-get install -y clang-format

      - name: Check formatting
        run: |
          find code/ extras/ -name "*.cpp" -o -name "*.h" \
            | grep -v "cmake-build" \
            | xargs clang-format --dry-run --Werror
